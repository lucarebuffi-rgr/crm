<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GA Probates — Call List</title>

<!-- Firebase (no build step — loaded straight from Google's CDN) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');
  * { box-sizing: border-box; }
  body { margin: 0; background: #0d1b2e; color: #e8ecf1; font-family: 'Inter', system-ui, sans-serif; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  button { cursor: pointer; font-family: inherit; }
  select, textarea, input { font-family: inherit; }
  a { text-decoration: none; }
  ::selection { background: #d4a84355; }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: #22385a; border-radius: 4px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 1s linear infinite; display: inline-block; }

  /* ---------- App ---------- */
  #app-screen { display: block; min-height: 100vh; }
  .header {
    border-bottom: 1px solid #1b3151; padding: 20px 24px; position: sticky; top: 0;
    background: rgba(13,27,46,0.93); backdrop-filter: blur(8px); z-index: 20;
  }
  .header-inner, .content {
    max-width: 1100px; margin: 0 auto;
  }
  .header-inner {
    display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
  }
  .eyebrow { font-size: 12px; letter-spacing: 0.14em; color: #d4a843; font-weight: 700; text-transform: uppercase; }
  .header-inner h1 { margin: 2px 0 0; font-size: 22px; font-weight: 800; }
  .header-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .btn-gold {
    background: #d4a843; color: #0d1b2e; border: none; border-radius: 8px; padding: 10px 16px;
    font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 8px;
  }
  .btn-ghost {
    background: none; border: 1px solid #22385a; color: #8a97a8; border-radius: 8px; padding: 9px 14px; font-size: 13px;
  }
  .sync-note { font-size: 12px; color: #8a97a8; display: flex; align-items: center; gap: 4px; }

  .content { padding: 20px 24px 80px; }

  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .stat-card { background: #142640; border: 1px solid #22385a; border-radius: 10px; padding: 10px 12px; text-align: left; }
  .stat-card.active { background: #1b3151; }
  .stat-value { font-size: 20px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
  .stat-label { font-size: 11px; color: #8a97a8; margin-top: 2px; line-height: 1.2; }

  .controls { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .search-wrap { position: relative; flex: 1 1 220px; }
  .search-wrap input {
    width: 100%; padding: 9px 12px 9px 32px; border-radius: 8px; border: 1px solid #22385a;
    background: #142640; color: #e8ecf1; font-size: 14px;
  }
  .search-wrap span { position: absolute; left: 10px; top: 9px; color: #8a97a8; }
  .controls select {
    padding: 9px 12px; border-radius: 8px; border: 1px solid #22385a; background: #142640; color: #e8ecf1; font-size: 14px;
  }

  .empty-state { text-align: center; padding: 60px 20px; color: #8a97a8; border: 1px dashed #22385a; border-radius: 12px; }

  .lead-card { background: #142640; border: 1px solid #22385a; border-radius: 12px; overflow: hidden; margin-bottom: 10px; }
  .lead-card.is-fire { border-color: #e0954a; }
  .lead-row { padding: 14px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; cursor: pointer; }
  .lead-checkbox { width: 18px; height: 18px; accent-color: #d4a843; cursor: pointer; flex-shrink: 0; }
  .fire-btn {
    background: none; border: 1px solid #22385a; border-radius: 8px; padding: 6px 9px; font-size: 15px;
    line-height: 1; flex-shrink: 0; opacity: 0.5;
  }
  .fire-btn.active { border-color: #e0954a; background: #e0954a22; opacity: 1; }
  .fire-badge {
    font-size: 11px; font-weight: 800; padding: 2px 8px; border-radius: 20px; background: #e0954a22;
    color: #e0954a; border: 1px solid #e0954a55; white-space: nowrap;
  }
  .lead-main { flex: 1 1 200px; min-width: 0; }
  .lead-name-line { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .lead-name { font-weight: 700; font-size: 15px; }
  .status-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; border: 1px solid; white-space: nowrap; }
  .lead-address { font-size: 13px; color: #8a97a8; margin-top: 3px; }
  .call-link {
    color: #d4a843; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 6px;
    padding: 6px 10px; border: 1px solid #22385a; border-radius: 8px;
  }
  .call-meta { text-align: right; font-size: 12px; color: #8a97a8; min-width: 90px; }
  .call-meta .attempts { color: #e8ecf1; font-weight: 700; }
  .toggle-btn { background: none; border: none; color: #8a97a8; padding: 6px; font-size: 16px; pointer-events: none; }

  .lead-detail { border-top: 1px solid #22385a; padding: 16px; background: #0f2036; cursor: default; }
  .status-track { display: flex; gap: 4px; margin-bottom: 14px; flex-wrap: wrap; }
  .status-step {
    flex: 1 1 100px; padding: 8px 6px; border-radius: 6px; text-align: center; font-size: 11px; font-weight: 700;
    border: 1px solid #22385a; background: #142640; color: #8a97a8; cursor: pointer;
  }
  .fin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 14px; }
  .fin-field label { display: block; font-size: 11px; color: #8a97a8; margin-bottom: 4px; }
  .fin-field input {
    width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid #22385a; background: #142640;
    color: #e8ecf1; font-size: 13px;
  }
  .outcome-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .outcome-row select { padding: 8px 10px; border-radius: 6px; border: 1px solid #22385a; background: #142640; color: #e8ecf1; font-size: 13px; flex: 1 1 160px; }
  .note-input {
    width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #22385a; background: #142640;
    color: #e8ecf1; font-size: 13px; resize: vertical; margin-bottom: 8px;
  }
  .detail-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .log-call-btn {
    background: #d4a843; color: #0d1b2e; border: none; border-radius: 6px; padding: 8px 14px;
    font-weight: 700; font-size: 13px; display: flex; align-items: center; gap: 6px;
  }
  .delete-lead-btn {
    background: none; border: 1px solid #d9534f; color: #ff8b7e; border-radius: 6px; padding: 8px 14px;
    font-size: 13px; font-weight: 700; margin-left: auto;
  }
  .notes-list { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; max-height: 260px; overflow-y: auto; }
  .note-entry { font-size: 13px; border-left: 2px solid #22385a; padding-left: 10px; }
  .note-meta { display: flex; gap: 8px; align-items: center; color: #8a97a8; font-size: 11px; flex-wrap: wrap; }
  .note-outcome { color: #d4a843; font-weight: 600; }
  .note-text { margin-top: 2px; color: #e8ecf1; }

  .bulk-bar { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; flex-wrap: wrap; }
  .bulk-bar label { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #8a97a8; cursor: pointer; }
  .bulk-bar input[type="checkbox"] { width: 16px; height: 16px; accent-color: #d4a843; cursor: pointer; }
  .btn-danger {
    background: #3a1e1e; border: 1px solid #d9534f; color: #ff8b7e; border-radius: 8px; padding: 8px 14px;
    font-size: 13px; font-weight: 700;
  }
  .btn-danger:disabled { opacity: 0.35; cursor: default; }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    padding: 10px 18px; border-radius: 8px; font-size: 14px; display: flex; align-items: center; gap: 8px;
    z-index: 50; max-width: 90vw; border: 1px solid #d4a843; background: #16263d;
  }
  .toast.error { border-color: #d9534f; background: #3a1e1e; }
</style>
</head>

          <span id="upload-icon">⬆</span> <span id="upload-label">Upload Today's List</span>
        </button>
        <input type="file" id="file-input" accept=".csv" style="display:none" />
      </div>
    </div>
  </div>

  <div class="content">
    <div class="stats-grid" id="stats-grid"></div>

    <div class="controls">
      <div class="search-wrap">
        <span>🔍</span>
        <input id="search-input" placeholder="Search name, phone, address…" />
      </div>
      <select id="status-filter">
        <option value="active">Active leads</option>
        <option value="all">All leads</option>
        <option value="fire">🔥 Fire Leads</option>
      </select>
      <select id="sort-by">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
        <option value="attempts">Most attempts</option>
        <option value="name">Name A–Z</option>
      </select>
    </div>

    <div class="bulk-bar">
      <label><input type="checkbox" id="select-all-checkbox" /> Select all</label>
      <button class="btn-danger" id="delete-selected-btn" disabled>Delete Selected (0)</button>
    </div>

    <div id="lead-list"></div>
  </div>
</div>

<div id="toast-container"></div>

<script>
/* =========================================================================
   FIREBASE CONFIG — replace this with YOUR project's config.
   Get it from: Firebase Console → Project Settings → General → Your apps
   ========================================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyDNpa-2O0RduvXa5qmmIfFoioKG4gyoCOs",
  authDomain: "rgr-crm-941ab.firebaseapp.com",
  projectId: "rgr-crm-941ab",
  storageBucket: "rgr-crm-941ab.firebasestorage.app",
  messagingSenderId: "970218702810",
  appId: "1:970218702810:web:03409e8b0e971bb0b6e2e3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const leadsRef = db.collection('leads');

/* ---------------- Config: statuses & call outcomes ---------------- */
const STATUSES = [
  { id: 'new',            label: 'New',                 color: '#5b8fd4' },
  { id: 'trying',         label: 'Trying to Reach',      color: '#e0954a' },
  { id: 'progress',       label: 'In Progress',          color: '#d4a843' },
  { id: 'callback',       label: 'Callback Scheduled',   color: '#7fb3d9' },
  { id: 'not_interested', label: 'Not Interested',       color: '#8a97a8' },
  { id: 'dead',           label: 'Dead / Bad Number',    color: '#d9534f' },
  { id: 'deal',           label: 'Deal Closed',          color: '#4caf82' },
];
const STATUS_MAP = Object.fromEntries(STATUSES.map(s => [s.id, s]));

const OUTCOMES = [
  { id: 'no_answer',          label: 'No Answer',            status: 'trying' },
  { id: 'voicemail',          label: 'Left Voicemail',       status: 'trying' },
  { id: 'busy',               label: 'Busy / Call Back',     status: 'trying' },
  { id: 'talked',             label: 'Talked — Working It',  status: 'progress' },
  { id: 'callback_scheduled', label: 'Scheduled Callback',   status: 'callback' },
  { id: 'not_interested',     label: 'Not Interested',       status: 'not_interested' },
  { id: 'wrong_number',       label: 'Wrong / Bad Number',   status: 'dead' },
  { id: 'deal',               label: 'Deal Closed',          status: 'deal' },
];

/* ---------------- Helpers ---------------- */
function normalizeHeader(h) { return (h || '').toLowerCase().replace(/[^a-z]/g, ''); }
function digitsOnly(s) { return (s || '').replace(/\D/g, ''); }
function dedupeKey(lead) {
  const digits = digitsOnly(lead.phone);
  if (digits.length >= 7) return 'ph:' + digits.slice(-10);
  return 'nm:' + (lead.firstName + lead.lastName + lead.address).toLowerCase().replace(/\s+/g, '');
}
function formatPhone(raw) {
  const d = digitsOnly(raw);
  if (d.length === 10) return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
  if (d.length === 11 && d[0] === '1') return `(${d.slice(1,4)}) ${d.slice(4,7)}-${d.slice(7)}`;
  return raw || '—';
}
function timeAgo(iso) {
  if (!iso) return null;
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.round(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.round(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.round(hrs / 24)}d ago`;
}
function shortDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}
function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function showToast(msg, kind) {
  const el = document.createElement('div');
  el.className = 'toast' + (kind === 'error' ? ' error' : '');
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3800);
}

/* ---------------- State ---------------- */
let leads = [];
let expandedId = null;
let search = '';
let statusFilter = 'active';
let sortBy = 'newest';
let drafts = {}; // per-lead in-progress call-log form state, survives re-renders
let selectedIds = new Set();

/* ---------------- Firestore live sync ---------------- */
let unsubscribe = null;
function startListening() {
  if (unsubscribe) return;
  unsubscribe = leadsRef.orderBy('addedAt', 'desc').onSnapshot(snapshot => {
    leads = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    document.getElementById('sync-note').textContent = '';
    render();
  }, err => {
    document.getElementById('sync-note').textContent = 'Sync error';
    console.error(err);
  });
}
startListening();

/* ---------------- CSV Upload ---------------- */
document.getElementById('upload-btn').addEventListener('click', () => document.getElementById('file-input').click());
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  e.target.value = '';
  if (file) handleFile(file);
});

function setUploadBusy(busy) {
  document.getElementById('upload-btn').disabled = busy;
  document.getElementById('upload-label').textContent = busy ? 'Uploading…' : "Upload Today's List";
  document.getElementById('upload-icon').innerHTML = busy ? '<span class="spin">⟳</span>' : '⬆';
}

function handleFile(file) {
  setUploadBusy(true);
  Papa.parse(file, {
    header: true,
    skipEmptyLines: true,
    complete: async (results) => {
      try {
        const rows = results.data;
        if (!rows.length) { showToast('That file had no rows in it.', 'error'); setUploadBusy(false); return; }

        const fieldMap = {};
        Object.keys(rows[0]).forEach(h => {
          const n = normalizeHeader(h);
          if (n.includes('first')) fieldMap.firstName = h;
          else if (n.includes('last')) fieldMap.lastName = h;
          else if (n.includes('address')) fieldMap.address = h;
          else if (n.includes('city')) fieldMap.city = h;
          else if (n.includes('state')) fieldMap.state = h;
          else if (n.includes('zip')) fieldMap.zip = h;
          else if (n.includes('phone')) fieldMap.phone = h;
        });

        if (!fieldMap.phone || !fieldMap.firstName) {
          showToast("Couldn't find name/phone columns in that CSV — check the headers.", 'error');
          setUploadBusy(false);
          return;
        }

        const uploadDate = new Date().toISOString();
        const existingKeys = new Set(leads.map(dedupeKey));
        let added = 0, skipped = 0;
        const batch = db.batch();

        rows.forEach(row => {
          const lead = {
            firstName: (row[fieldMap.firstName] || '').trim(),
            lastName: (row[fieldMap.lastName] || '').trim(),
            address: (row[fieldMap.address] || '').trim(),
            city: (row[fieldMap.city] || '').trim(),
            state: (row[fieldMap.state] || '').trim(),
            zip: (row[fieldMap.zip] || '').trim(),
            phone: (row[fieldMap.phone] || '').trim(),
          };
          if (!lead.firstName && !lead.phone) return;
          const key = dedupeKey(lead);
          if (existingKeys.has(key)) { skipped++; return; }
          existingKeys.add(key);
          added++;
          const docRef = leadsRef.doc();
          batch.set(docRef, {
            ...lead,
            status: 'new',
            callAttempts: 0,
            lastCalledAt: null,
            addedAt: uploadDate,
            notes: [],
            leadValue: '',
            askingPrice: '',
            lao: '',
            mao: '',
            fireLead: false,
          });
        });

        if (added > 0) await batch.commit();
        showToast(`Added ${added} new lead${added === 1 ? '' : 's'}${skipped ? `, skipped ${skipped} duplicate${skipped === 1 ? '' : 's'}` : ''}.`, 'success');
      } catch (err) {
        console.error(err);
        showToast('Something went wrong saving that list.', 'error');
      } finally {
        setUploadBusy(false);
      }
    },
    error: () => { showToast('Could not parse that CSV file.', 'error'); setUploadBusy(false); }
  });
}

/* ---------------- Lead updates ---------------- */
function updateStatus(id, status) {
  leadsRef.doc(id).update({ status }).catch(() => showToast('Could not update status.', 'error'));
}

function toggleFire(id, current) {
  leadsRef.doc(id).update({ fireLead: !current }).catch(() => showToast('Could not update fire flag.', 'error'));
}

function updateField(id, field, value) {
  leadsRef.doc(id).update({ [field]: value }).catch(() => showToast('Could not save that field.', 'error'));
}

async function deleteLead(id) {
  if (!confirm('Delete this lead? This cannot be undone.')) return;
  try {
    await leadsRef.doc(id).delete();
    selectedIds.delete(id);
    showToast('Lead deleted.', 'success');
  } catch (e) {
    showToast('Could not delete that lead.', 'error');
  }
}

async function deleteSelected() {
  const count = selectedIds.size;
  if (count === 0) return;
  if (!confirm(`Delete ${count} lead${count === 1 ? '' : 's'}? This cannot be undone.`)) return;
  const batch = db.batch();
  selectedIds.forEach(id => batch.delete(leadsRef.doc(id)));
  try {
    await batch.commit();
    selectedIds.clear();
    showToast(`Deleted ${count} lead${count === 1 ? '' : 's'}.`, 'success');
  } catch (e) {
    showToast('Could not delete those leads.', 'error');
  }
}

function logCall(id) {
  const draft = drafts[id] || { outcome: 'no_answer', text: '' };
  const outcome = OUTCOMES.find(o => o.id === draft.outcome);
  const entry = {
    at: new Date().toISOString(),
    outcome: outcome ? outcome.label : 'Note',
    text: (draft.text || '').trim(),
  };
  leadsRef.doc(id).update({
    callAttempts: firebase.firestore.FieldValue.increment(1),
    lastCalledAt: entry.at,
    status: outcome ? outcome.status : STATUS_MAP.new.id,
    notes: firebase.firestore.FieldValue.arrayUnion(entry),
  }).then(() => {
    drafts[id] = { outcome: draft.outcome, text: '' };
  }).catch(() => showToast('Could not log that call.', 'error'));
}

/* ---------------- Filtering / sorting ---------------- */
function getFiltered() {
  let list = leads;
  if (statusFilter === 'active') {
    list = list.filter(l => l.status !== 'dead' && l.status !== 'not_interested' && l.status !== 'deal');
  } else if (statusFilter === 'fire') {
    list = list.filter(l => l.fireLead);
  } else if (statusFilter !== 'all') {
    list = list.filter(l => l.status === statusFilter);
  }
  const q = search.trim().toLowerCase();
  if (q) {
    list = list.filter(l =>
      `${l.firstName} ${l.lastName}`.toLowerCase().includes(q) ||
      (l.phone || '').includes(q) ||
      (l.address || '').toLowerCase().includes(q) ||
      (l.city || '').toLowerCase().includes(q)
    );
  }
  const sorted = [...list];
  if (sortBy === 'newest') sorted.sort((a,b) => new Date(b.addedAt) - new Date(a.addedAt));
  else if (sortBy === 'oldest') sorted.sort((a,b) => new Date(a.addedAt) - new Date(b.addedAt));
  else if (sortBy === 'attempts') sorted.sort((a,b) => (b.callAttempts||0) - (a.callAttempts||0));
  else if (sortBy === 'name') sorted.sort((a,b) => a.firstName.localeCompare(b.firstName));
  return sorted;
}

/* ---------------- Rendering ---------------- */
function render() {
  renderStats();
  renderList();
  renderBulkBar();
}

function renderBulkBar() {
  const filtered = getFiltered();
  const btn = document.getElementById('delete-selected-btn');
  btn.textContent = `Delete Selected (${selectedIds.size})`;
  btn.disabled = selectedIds.size === 0;
  const allCb = document.getElementById('select-all-checkbox');
  allCb.checked = filtered.length > 0 && filtered.every(l => selectedIds.has(l.id));
}

function renderStats() {
  const grid = document.getElementById('stats-grid');
  const counts = { total: leads.length };
  STATUSES.forEach(s => counts[s.id] = leads.filter(l => l.status === s.id).length);

  let html = `<button class="stat-card ${statusFilter==='all'?'active':''}" data-filter="all">
      <div class="stat-value" style="color:#e8ecf1">${counts.total}</div>
      <div class="stat-label">Total Leads</div></button>`;
  STATUSES.forEach(s => {
    html += `<button class="stat-card ${statusFilter===s.id?'active':''}" data-filter="${s.id}" style="border-color:${statusFilter===s.id ? s.color : '#22385a'}">
      <div class="stat-value" style="color:${s.color}">${counts[s.id]||0}</div>
      <div class="stat-label">${s.label}</div></button>`;
  });
  grid.innerHTML = html;
  grid.querySelectorAll('[data-filter]').forEach(btn => {
    btn.addEventListener('click', () => {
      statusFilter = btn.getAttribute('data-filter');
      document.getElementById('status-filter').value = ['all','active'].includes(statusFilter) ? statusFilter : 'all';
      render();
    });
  });
}

function renderList() {
  const container = document.getElementById('lead-list');
  const filtered = getFiltered();

  if (leads.length === 0) {
    container.innerHTML = `<div class="empty-state">No leads yet. Upload a CSV to get started.</div>`;
    return;
  }
  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state">No leads match your filters.</div>`;
    return;
  }

  container.innerHTML = filtered.map(lead => renderCard(lead)).join('');
  attachCardListeners();
}

function renderCard(lead) {
  const status = STATUS_MAP[lead.status] || STATUSES[0];
  const isOpen = expandedId === lead.id;
  const isFire = !!lead.fireLead;
  const isSelected = selectedIds.has(lead.id);
  const notes = lead.notes || [];

  let detail = '';
  if (isOpen) {
    const draft = drafts[lead.id] || { outcome: 'no_answer', text: '' };
    detail = `
      <div class="lead-detail">
        <div class="status-track">
          ${STATUSES.map(s => `<div class="status-step" data-status-step="${lead.id}" data-status-value="${s.id}"
              style="${s.id === lead.status
                ? `background:${s.color};border-color:${s.color};color:#0d1b2e;`
                : `color:${s.color};`}">${s.label}</div>`).join('')}
        </div>

        <div class="fin-grid">
          <div class="fin-field">
            <label>Lead Value</label>
            <input type="text" inputmode="decimal" placeholder="$0" value="${escapeHtml(lead.leadValue || '')}" data-field-input="${lead.id}" data-field-name="leadValue" />
          </div>
          <div class="fin-field">
            <label>Asking Price</label>
            <input type="text" inputmode="decimal" placeholder="$0" value="${escapeHtml(lead.askingPrice || '')}" data-field-input="${lead.id}" data-field-name="askingPrice" />
          </div>
          <div class="fin-field">
            <label>LAO</label>
            <input type="text" inputmode="decimal" placeholder="$0" value="${escapeHtml(lead.lao || '')}" data-field-input="${lead.id}" data-field-name="lao" />
          </div>
          <div class="fin-field">
            <label>MAO</label>
            <input type="text" inputmode="decimal" placeholder="$0" value="${escapeHtml(lead.mao || '')}" data-field-input="${lead.id}" data-field-name="mao" />
          </div>
        </div>

        <div class="outcome-row">
          <select data-outcome-select="${lead.id}">
            ${OUTCOMES.map(o => `<option value="${o.id}" ${o.id===draft.outcome?'selected':''}>${o.label}</option>`).join('')}
          </select>
        </div>
        <textarea class="note-input" rows="2" placeholder="What happened on the call? (optional)" data-note-input="${lead.id}">${escapeHtml(draft.text)}</textarea>
        <div class="detail-actions">
          <button class="log-call-btn" data-log-call="${lead.id}">+ Log Call</button>
          <button class="delete-lead-btn" data-delete-lead="${lead.id}">Delete Lead</button>
        </div>
        ${notes.length ? `<div class="notes-list">${notes.slice().reverse().map(n => `
          <div class="note-entry">
            <div class="note-meta">
              🕒 ${new Date(n.at).toLocaleString(undefined, { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' })}
              <span class="note-outcome">${escapeHtml(n.outcome)}</span>
            </div>
            ${n.text ? `<div class="note-text">${escapeHtml(n.text)}</div>` : ''}
          </div>`).join('')}</div>` : ''}
      </div>`;
  }

  return `
    <div class="lead-card ${isFire ? 'is-fire' : ''}">
      <div class="lead-row" data-row-toggle="${lead.id}">
        <input type="checkbox" class="lead-checkbox" data-select="${lead.id}" ${isSelected ? 'checked' : ''} />
        <button class="fire-btn ${isFire ? 'active' : ''}" data-fire="${lead.id}" data-fire-current="${isFire}" title="Favorite this lead">🔥</button>
        <div class="lead-main">
          <div class="lead-name-line">
            <span class="lead-name">${escapeHtml(lead.firstName)} ${escapeHtml(lead.lastName)}</span>
            <span class="status-badge" style="background:${status.color}22;color:${status.color};border-color:${status.color}55">${status.label}</span>
            ${isFire ? `<span class="fire-badge">🔥 FIRE LEAD</span>` : ''}
          </div>
          <div class="lead-address">📍 ${escapeHtml(lead.address)}${lead.address ? ', ' : ''}${escapeHtml(lead.city)} ${escapeHtml(lead.state)} ${escapeHtml(lead.zip)}</div>
        </div>
        <a class="call-link mono" href="tel:${digitsOnly(lead.phone)}" data-call-link>📞 ${formatPhone(lead.phone)}</a>
        <div class="call-meta">
          <div class="attempts mono">${lead.callAttempts||0} call${(lead.callAttempts||0)===1?'':'s'}</div>
          <div>${lead.lastCalledAt ? `last: ${timeAgo(lead.lastCalledAt)}` : `added ${shortDate(lead.addedAt)}`}</div>
        </div>
        <button class="toggle-btn">${isOpen ? '▴' : '▾'}</button>
      </div>
      ${detail}
    </div>`;
}

function attachCardListeners() {
  document.querySelectorAll('[data-row-toggle]').forEach(row => {
    row.addEventListener('click', () => {
      const id = row.getAttribute('data-row-toggle');
      expandedId = expandedId === id ? null : id;
      render();
    });
  });
  document.querySelectorAll('[data-select]').forEach(cb => {
    cb.addEventListener('click', e => e.stopPropagation());
    cb.addEventListener('change', () => {
      const id = cb.getAttribute('data-select');
      if (cb.checked) selectedIds.add(id); else selectedIds.delete(id);
      renderBulkBar();
    });
  });
  document.querySelectorAll('[data-fire]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = btn.getAttribute('data-fire');
      const current = btn.getAttribute('data-fire-current') === 'true';
      toggleFire(id, current);
    });
  });
  document.querySelectorAll('[data-call-link]').forEach(a => {
    a.addEventListener('click', e => e.stopPropagation());
  });
  document.querySelectorAll('[data-status-step]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      updateStatus(el.getAttribute('data-status-step'), el.getAttribute('data-status-value'));
    });
  });
  document.querySelectorAll('[data-field-input]').forEach(inp => {
    inp.addEventListener('click', e => e.stopPropagation());
    inp.addEventListener('blur', () => {
      updateField(inp.getAttribute('data-field-input'), inp.getAttribute('data-field-name'), inp.value);
    });
  });
  document.querySelectorAll('[data-outcome-select]').forEach(sel => {
    sel.addEventListener('click', e => e.stopPropagation());
    sel.addEventListener('change', () => {
      const id = sel.getAttribute('data-outcome-select');
      drafts[id] = { ...(drafts[id]||{}), outcome: sel.value };
    });
  });
  document.querySelectorAll('[data-note-input]').forEach(ta => {
    ta.addEventListener('click', e => e.stopPropagation());
    ta.addEventListener('input', () => {
      const id = ta.getAttribute('data-note-input');
      drafts[id] = { ...(drafts[id]||{ outcome: 'no_answer' }), text: ta.value };
    });
  });
  document.querySelectorAll('[data-log-call]').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); logCall(btn.getAttribute('data-log-call')); });
  });
  document.querySelectorAll('[data-delete-lead]').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); deleteLead(btn.getAttribute('data-delete-lead')); });
  });
}

/* ---------------- Controls ---------------- */
document.getElementById('search-input').addEventListener('input', e => { search = e.target.value; render(); });
document.getElementById('status-filter').addEventListener('change', e => { statusFilter = e.target.value; render(); });
document.getElementById('sort-by').addEventListener('change', e => { sortBy = e.target.value; render(); });
document.getElementById('select-all-checkbox').addEventListener('change', e => {
  const filtered = getFiltered();
  if (e.target.checked) filtered.forEach(l => selectedIds.add(l.id));
  else filtered.forEach(l => selectedIds.delete(l.id));
  render();
});
document.getElementById('delete-selected-btn').addEventListener('click', deleteSelected);
</script>
</body>
</html>
